# ===============================
# Configuration Oracle FINAL
# ===============================

spring.datasource.url=jdbc:oracle:thin:@//192.1.1.94:1521/ibanktest

spring.datasource.username=ibank
spring.datasource.password=bank
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# ===============================
# JPA / Hibernate
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

# CHANGEMENT IMPORTANT ICI :
spring.jpa.properties.hibernate.default_schema=IBANKT

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param


spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE